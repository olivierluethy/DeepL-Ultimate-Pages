<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>DeepL Pro Unlimited — Uninstalled</title>
    <style>
      :root {
        --bg: #15171c;
        --surface: #1e2128;
        --text: #e6e8ec;
        --muted: #9aa1ad;
        --accent: #4d9bff;
        --border: #2e333d;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        max-width: 460px;
        width: 100%;
        padding: 36px 32px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }
      h1 { font-size: 1.35rem; margin: 0 0 8px; color: var(--accent); }
      p { color: var(--muted); font-size: 0.95rem; line-height: 1.5; margin: 8px 0 0; }
      .spinner {
        width: 38px; height: 38px;
        margin: 6px auto 18px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      .fallback { margin-top: 22px; font-size: 0.85rem; }
      .fallback a { color: var(--accent); }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Thanks — one quick question…</h1>
      <p>You just uninstalled DeepL Pro Unlimited. We're taking you to a 30-second survey so we can improve.</p>
      <p class="fallback">Not redirected? <a id="manualLink" href="#">Open the survey</a>.</p>
    </div>

    <script>
      (function () {
        "use strict";

        // ─────────────────────────────────────────────────────────────
        // CONFIG — verify before publishing. PostHog values are the
        // project's PUBLIC ingestion key + region host (safe in a public
        // repo); the survey URL is where the user lands after the ping.
        // ─────────────────────────────────────────────────────────────
        var POSTHOG_KEY = "phc_vdh5V2RdTvv78E778stRjmNqXf7LNwEEhPhHteafYvLG"; // FILL IN / VERIFY: PostHog PUBLIC project API key (write-only). NEVER a personal/private key.
        var POSTHOG_HOST = "https://eu.i.posthog.com"; // FILL IN / VERIFY: region host. EU Cloud = https://eu.i.posthog.com · US Cloud = https://us.i.posthog.com
        var SURVEY_URL = "https://forms.gle/cFNf17u5CxSQ8d6t6"; // FILL IN: Google Form (uninstall survey)

        var CAPTURE_PATH = "/i/v0/e/"; // PostHog single-event ingestion endpoint
        var REDIRECT_MS = 1200;        // show the loader briefly; sendBeacon is already queued by now
        var MAX_WAIT_MS = 1500;        // hard ceiling — never strand the user

        // Optional local diagnostics: open  uninstall.html?d=...&debug=1
        var debug = false;
        try { debug = new URLSearchParams(location.search).get("debug") === "1"; } catch (e) {}

        function param(name) {
          try { return new URLSearchParams(location.search).get(name) || ""; }
          catch (e) { return ""; }
        }
        function intOrNull(s) { var n = parseInt(s, 10); return isNaN(n) ? null : n; }

        // The whole point of stitching: reuse the EXACT distinct_id the
        // extension embedded (?d=...), so this lands on that user's history.
        var distinctId = param("d");
        var version = param("v");
        var mainCompleted = intOrNull(param("mc"));
        var docsCompleted = intOrNull(param("dc"));

        document.getElementById("manualLink").setAttribute("href", SURVEY_URL);

        var redirected = false;
        function redirect() {
          if (redirected) return;
          redirected = true;
          location.replace(SURVEY_URL);
        }

        var endpoint = POSTHOG_HOST.replace(/\/+$/, "") + CAPTURE_PATH;

        // PostHog capture shape: api_key + event + distinct_id (+ properties).
        var payload = {
          api_key: POSTHOG_KEY,
          event: "extension_uninstalled",
          distinct_id: distinctId || "anonymous_uninstall",
          properties: {
            distinct_id: distinctId || "anonymous_uninstall",
            extension_version: version || "unknown",
            main_translations_completed: mainCompleted,
            documents_completed: docsCompleted,
            had_distinct_id: !!distinctId,
            $lib: "uninstall-page",
            browser_language: navigator.language,
            $current_url: location.href
          },
          timestamp: new Date().toISOString()
        };
        var body = JSON.stringify(payload);

        // Transport that SURVIVES navigation — the redirect cannot cancel it.
        var beaconOk = false;
        try {
          if (navigator.sendBeacon) {
            beaconOk = navigator.sendBeacon(endpoint, new Blob([body], { type: "application/json" }));
          }
        } catch (e) { beaconOk = false; }

        // Fallback (also survives navigation) if the browser refused the beacon.
        if (!beaconOk) {
          try {
            fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: body,
              keepalive: true
            }).catch(function () {});
          } catch (e) {}
        }

        if (debug) {
          // Diagnostic mode: log everything and DO NOT redirect, so you can
          // inspect Network → request to /i/v0/e/ and confirm it isn't canceled.
          console.log("[uninstall] endpoint:", endpoint);
          console.log("[uninstall] sendBeacon returned:", beaconOk, "(false = browser refused to queue)");
          console.log("[uninstall] distinct_id:", payload.distinct_id, "| had_distinct_id:", payload.properties.had_distinct_id);
          console.log("[uninstall] payload:", payload);
          console.log("[uninstall] redirect suppressed (debug=1). Click the survey link when done.");
          return;
        }

        setTimeout(redirect, REDIRECT_MS);
        setTimeout(redirect, MAX_WAIT_MS);
      })();
    </script>
  </body>
</html>
