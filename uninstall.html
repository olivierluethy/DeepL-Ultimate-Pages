<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #15171c;
        color: #e6e8ec;
        padding: 24px;
      }
      .box { text-align: center; max-width: 440px; }
      .spinner {
        width: 30px; height: 30px;
        margin: 0 auto 16px;
        border: 3px solid #2e333d;
        border-top-color: #4d9bff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
      h1 { font-size: 1.2rem; margin: 0 0 6px; color: #4d9bff; }
      p { font-size: 0.95rem; margin: 0; color: #9aa1ad; line-height: 1.5; }
      a { color: #4d9bff; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Thanks — one quick question…</h1>
      <p>Taking you to a 30-second survey. Not redirected? <a id="manualLink" href="#">Open the survey</a>.</p>
    </div>

    <script>
      // Uninstall redirect for DeepL Pro Unlimited.
      //
      // Chrome runs no extension code at uninstall — the only hook is
      // setUninstallURL(), which points here. This page:
      //   1. Reads the analytics distinct_id (?d=) the extension embedded.
      //   2. Fires `extension_uninstalled` to PostHog via a KEEPALIVE FETCH
      //      to /capture/ — this survives the navigation away from the page.
      //      (sendBeacon with an application/json Blob is dropped by Chrome's
      //      CORS preflight on cross-origin requests, which is why it failed.)
      //   3. Redirects to the Google Form once the POST settles, or after a
      //      short timeout — whichever comes first.
      //
      // Values mirror analytics.js — keep them in sync if they change there.
      (function () {
        "use strict";

        var POSTHOG_HOST = "https://eu.i.posthog.com";                          // FILL IN / VERIFY: PostHog region host (EU)
        var POSTHOG_API_KEY = "phc_vdh5V2RdTvv78E778stRjmNqXf7LNwEEhPhHteafYvLG"; // FILL IN / VERIFY: PostHog PUBLIC project key (write-only)
        var FORM_URL = "https://forms.gle/cFNf17u5CxSQ8d6t6";                   // FILL IN: Google Form (uninstall survey)
        var EVENT_NAME = "extension_uninstalled";
        var REDIRECT_TIMEOUT_MS = 1200; // hard cap so the user never waits on a slow/blocked network

        function param(name) {
          try { return new URLSearchParams(window.location.search).get(name) || ""; }
          catch (e) { return ""; }
        }
        function intOrNull(s) { var n = parseInt(s, 10); return isNaN(n) ? null : n; }

        // The whole point of stitching: reuse the EXACT distinct_id the
        // extension embedded (?d=...), so this lands on that user's history.
        var distinctId = param("d") || "unknown";
        var version = param("v");
        var mainCompleted = intOrNull(param("mc"));
        var docsCompleted = intOrNull(param("dc"));
        var debug = param("debug") === "1";

        document.getElementById("manualLink").setAttribute("href", FORM_URL);

        var redirected = false;
        function redirectToForm() {
          if (redirected || debug) return;
          redirected = true;
          window.location.replace(FORM_URL);
        }

        // Whichever comes first: the capture call settles, or the timeout fires.
        var timer = setTimeout(redirectToForm, REDIRECT_TIMEOUT_MS);
        function done() { clearTimeout(timer); redirectToForm(); }

        var payload = {
          api_key: POSTHOG_API_KEY,
          event: EVENT_NAME,
          distinct_id: distinctId,
          properties: {
            distinct_id: distinctId,
            extension_version: version || "unknown",
            main_translations_completed: mainCompleted,
            documents_completed: docsCompleted,
            had_distinct_id: distinctId !== "unknown",
            $lib: "chrome-extension-uninstall-redirect",
            source: "uninstall_redirect",
            browser_language: navigator.language,
            $current_url: window.location.href
          },
          timestamp: new Date().toISOString()
        };

        if (debug) {
          console.log("[uninstall] POST", POSTHOG_HOST + "/capture/");
          console.log("[uninstall] payload:", payload);
          console.log("[uninstall] redirect suppressed (debug=1) — check Network for /capture/, then click the survey link.");
        }

        try {
          fetch(POSTHOG_HOST + "/capture/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            keepalive: true, // CRITICAL: outlives the redirect navigation.
            body: JSON.stringify(payload)
          })
            .then(function (r) { if (debug) console.log("[uninstall] response status:", r.status); done(); })
            .catch(function (e) { if (debug) console.log("[uninstall] fetch error:", e); done(); });
        } catch (e) {
          // Never let a scripting error strand the user on this page.
          done();
        }
      })();
    </script>
  </body>
</html>
